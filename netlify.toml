# Netlify build config for HRMS frontend (Vite app lives in frontend/)
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: serve index.html for all routes (client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
